name: Scheduled E2E Tests

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  test-production:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm ci # TODO: Does not need to checkout project and install of the front-end dependencies just to run Cypress on the live server

      - name: Run E2E tests against production
        run: npm run cypress:run:live-prod

      - name: Upload screenshots
        uses: actions/upload-artifact@v3
        if: failure()
        with:
          name: cypress-screenshots
          path: cypress/screenshots
