<div
  class="audio-container"
  *ngIf="utmRoutes.selectedStop && utmRoutes.selectedStop.audio"
>
  <div
    class="audioplayer"
    [ngClass]="{ 'audioplayer-playing': audio.isPlaying }"
  >
    <div
      class="audioplayer-playpause"
      title=""
      (click)="audio.togglePlayPause()"
    >
      <a href="javascript:void(0);"></a>
    </div>
    <div class="audioplayer-time audioplayer-time-current">
      {{ audio.formattedPlayTime }}
    </div>
    <div
      class="audioplayer-bar"
      (touchstart)="onAudioBarStartScrubbing()"
      (touchmove)="onAudioBarScrubbed($event)"
      (touchend)="onAudioBarStopScrubbing()"
      (mousedown)="onAudioBarStartScrubbing()"
      (mousemove)="onAudioBarScrubbed($event)"
      (mouseup)="onAudioBarStopScrubbing()"
      (click)="onAudioBarClicked($event)"
      (mouseleave)="onAudioBarStopScrubbing()"
    >
      <!--      <div class="audioplayer-bar-loaded" [ngStyle]="{ width: '0%' }"></div>-->
      <div
        class="audioplayer-bar-played"
        [ngStyle]="{ width: audio.percentageComplete + '%' }"
      ></div>
    </div>
    <div class="audioplayer-time audioplayer-time-duration">
      {{ audio.formattedDuration }}
    </div>
    <!--    <div class="audioplayer-volume">-->
    <!--      <div class="audioplayer-volume-button" title="">-->
    <!--        <a href="javascript:void(0);"></a>-->
    <!--      </div>-->
    <!--      <div class="audioplayer-volume-adjust">-->
    <!--        <div><div style="width: 100%"></div></div>-->
    <!--      </div>-->
    <!--    </div>-->
  </div>
</div>

<app-edit-button [nid]="utmRoutes.selectedStop?.stop_id"></app-edit-button>

<h2 [innerHtml]="utmRoutes.selectedStop?.title"></h2>

<div class="media-container">
  <div *ngIf="utmRoutes.selectedStopHasMediaItems()">
    <div
      class="views-element-container"
      *ngFor="let mediaItem of utmRoutes.selectedStop?.media_items"
    >
      <app-media-item [mediaItem]="mediaItem"></app-media-item>
    </div>
  </div>
</div>

<div class="views-element-container" *ngIf="stopHasLocationStories()">
  <div class="story-head">
    <h2>{{ "storiesForLocation" | translate }}</h2>
  </div>
  <div class="story-hold">
    <app-story-preview
      [story]="locationStory"
      [url]="getStoryUrl(locationStory.story_url_alias)"
      class="story"
      *ngFor="let locationStory of utmRoutes.selectedStop?.location_stories"
    ></app-story-preview>
  </div>

  <app-feedback
    [feedbackItemId]="utmRoutes.selectedStop?.stop_id"
    feedbackGivenText="feedbackGiven"
    feedbackQuestionText="routeStopFeedbackQuestion"
  ></app-feedback>
</div>
