<div class="route-notification-card">
  <div class="route-notification-card__header">
    <span class="route-notification-card__icon" aria-hidden="true">
      <img
        class="route-notification-card__icon-img"
        src="assets/ui/svg/bell.svg"
        alt="Push-notificatie icoon"
      />
    </span>
    <div class="route-notification-card__title">Push-notificaties</div>
  </div>

  <div class="route-notification-card__body">
    <div class="route-notification-card__text">
      Zet dit aan om een melding te ontvangen als je bij een routepunt in de
      buurt bent.
    </div>

    <label class="route-notification-card__toggle">
      <input
        type="checkbox"
        [checked]="enabled"
        (change)="onToggleChange($event)"
      />
      <span class="route-notification-card__toggle-ui"></span>
    </label>

    <app-route-notifications-permissions-debug></app-route-notifications-permissions-debug>
  </div>
</div>
