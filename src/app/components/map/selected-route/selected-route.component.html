<div>
  <div class="dock-inner route-container">
    <div class="pad">
      <h2>{{ selectedRoute?.title }}</h2>
      <div class="route-container-inner">
        <div [innerHtml]="selectedRoute?.teaser"></div>
        <a class="route-start" id="route_start">Route starten</a>
      </div>
      <div class="photo-hold">
        <div class="photo">
          <div>
            <img loading="lazy" [src]="selectedRoute?.photo" alt="" />
          </div>
        </div>
        <div class="media-source">
          <div class="views-element-container"><div></div></div>
        </div>
      </div>
    </div>
  </div>
</div>
