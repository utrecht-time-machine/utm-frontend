<div class="map">
  <div class="map-view">
    <div id="mapbox" class="mapboxgl-map"></div>
  </div>
  <div class="map-data">
    <div class="map-data-handle"></div>
    <div class="map-data-dock" id="map_dock">
      <div class="views-element-container">
        <app-selected-item
          [title]="'Castellum'"
          [location]="'Woerden'"
          [introText]="
            'Intro text <strong>met HTML</strong>. Lorem ipsum dolor sit amet, consectetur adipisicing elit. Doloremque eligendi itaque iure sapiente velit. Aliquam consectetur deserunt dolor eligendi itaque laboriosam minima, nam nihil, placeat provident reprehenderit ullam velit voluptatum.'
          "
        ></app-selected-item>
      </div>
    </div>
    <div class="map-data-near">
      <div class="pad">
        <h2>Ontdek deze buurt</h2>
        <div class="card-hold promote" id="map_near">
          <div class="card">
            <a
              href="/nl/locaties/stedehuys-woerden"
              data-dock-id="444"
              data-dock="location"
              data-dock-name="Stedehuys, Woerden - Utrecht Time Machine"
            >
              <div class="head">
                <div>
                  <div>
                    <img src="https://via.placeholder.com/600x400" />
                  </div>
                </div>
              </div>
              <div class="core">
                <span class="type">Kerkplein 6</span
                ><span class="name">Stedehuys, Woerden</span
                ><span class="desc"
                  >Het voormalig stadhuis van de destijds Zuid-Hollandse stad
                  Woerden is een rijksmonument. </span
                ><span class="dist">5,4km</span>
              </div>
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
