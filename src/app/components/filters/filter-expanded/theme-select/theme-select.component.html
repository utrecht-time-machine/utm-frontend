<app-filter-expanded
  [title]="('themes' | translate) + numSelectedThemesStr"
  [icon]="themes.icon"
  (close)="filters.hide(location, FilterType.Theme)"
  [location]="location"
>
  <div class="theme-select-container">
    <div class="theme-search">
      <input 
        type="text" 
        class="theme-search-input"
        (input)="onSearchChange($event)" 
        [placeholder]="'search-themes' | translate"
      >
    </div>
    
    <div class="theme-list">
      <div *ngFor="let theme of themes.filtered | async" class="theme-checkbox-container">
        <mat-checkbox
          [id]="theme.nid"
          [name]="theme.nid"
          [value]="theme.nid"
          (change)="themes.toggle(theme.nid)"
          [checked]="themes.isSelected(theme.nid)"
          [disableRipple]="true"
        >
          <span [innerHTML]="theme.title"></span>
          <br />
          <span class="theme-head">{{ theme.head }}</span>
        </mat-checkbox>
      </div>
    </div>
  </div>
</app-filter-expanded>
