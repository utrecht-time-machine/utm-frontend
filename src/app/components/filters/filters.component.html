<div
  class="filters-container"
  [ngStyle]="getStyles$ | async"
  (click)="onClick()"
  *ngIf="routing.getSelectedView() !== SelectedView.Story"
>
  <app-active-filters-badge *ngIf="!(filters.isShowing | async)" />
  <app-filters-header />

  <app-time-filter *ngIf="filters.isShowing | async" />
  <app-theme-filter *ngIf="filters.isShowing | async" />

  <app-clear-filters-button *ngIf="filters.isShowing | async" />
</div>
