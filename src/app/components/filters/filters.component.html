<div
  class="filters-container"
  [ngStyle]="getStyles$ | async"
  (click)="onClick()"
  *ngIf="
    routing.getSelectedView() === SelectedView.Locations ||
    routing.getSelectedView() === SelectedView.Routes
  "
>
  <app-active-filters-badge *ngIf="!(filters.isShowing | async)" />

  <app-filters-header />

  <div
    class="filters-content"
    [@expandCollapse]="(filters.isShowing | async)?.toString()"
  >
    <app-time-filter />
    <app-theme-filter />
    <app-clear-filters-button />
  </div>
</div>
